name: secret-scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly full-history rescan so newly added detection rules catch
    # secrets committed in the past.
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history: gitleaks scans every commit, not just the checkout.
          fetch-depth: 0
          persist-credentials: false
      - name: Install latest gitleaks
        # Implementation: always fetch the latest release (instead of pinning)
        # so new detection rules apply without waiting for a version bump.
        # gitleaks CLI is MIT; the license-gated gitleaks-action is not used.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd "$RUNNER_TEMP"
          gh release download --repo gitleaks/gitleaks --pattern "*linux_x64.tar.gz" --output gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan full git history
        run: gitleaks git --no-banner --redact --verbose
