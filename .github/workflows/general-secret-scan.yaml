name: secret-scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly full-history rescan so newly added detection rules catch
    # secrets committed in the past.
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history: gitleaks scans every commit, not just the checkout.
          fetch-depth: 0
          persist-credentials: false
      - name: Resolve gitleaks version from pre-commit config
        # Implementation: the single source of truth for the gitleaks version
        # is the pre-commit rev, which Renovate keeps fresh via PRs that run
        # CI. Downloading "latest" here would bypass that review path.
        id: gitleaks
        run: |
          version=$(awk '$1 == "rev:" && found { print $2; exit } /gitleaks\/gitleaks/ { found=1 }' .pre-commit-config.yaml)
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Install gitleaks
        # gitleaks CLI is MIT; the license-gated gitleaks-action is not used.
        env:
          GH_TOKEN: ${{ github.token }}
          GITLEAKS_VERSION: ${{ steps.gitleaks.outputs.version }}
        run: |
          cd "$RUNNER_TEMP"
          gh release download "$GITLEAKS_VERSION" --repo gitleaks/gitleaks --pattern "*linux_x64.tar.gz" --output gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan full git history
        run: gitleaks git --no-banner --redact --verbose
