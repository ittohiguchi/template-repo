# Language-agnostic hooks only. Language-specific lint/format hooks are added
# during initial project setup (see CLAUDE.md).
# Hook revs are kept up to date by Renovate (pre-commit manager).
repos:
  - repo: local
    hooks:
      - id: no-stale-gitkeep
        name: 不要な .gitkeep を検出する
        entry: bash scripts/check-gitkeep.sh
        language: system
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.26.1
    hooks:
      - id: zizmor

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.4
    hooks:
      - id: check-github-workflows

  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.253.1
    hooks:
      - id: renovate-config-validator
