# 開発コマンドの単一入口。言語別の lint / typecheck / test / build も
# 必ずここに task として追加する(セットアップ手順は docs/setup-checklist.md)。
version: "3"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  setup:
    desc: git hook (pre-commit) をインストールする
    cmds:
      - pre-commit install

  # check は「全検証を束ねる親 task」。言語別の lint / typecheck / test を
  # 追加したら deps としてここにぶら下げ、CI もこの task を正とする。
  check:
    desc: 全検証を実行する
    deps:
      - test:gitkeep
      - test:repo-init
    cmds:
      - pre-commit run --all-files

  test:gitkeep:
    desc: .gitkeep 検出スクリプトのテストを実行する
    cmds:
      - bash tests/scripts/test-check-gitkeep.sh

  test:repo-init:
    desc: GitHub リポジトリ初期化スクリプトのテストを実行する
    cmds:
      - bash tests/scripts/test-init-repo-settings.sh

  repo-init:
    desc: GitHub リポジトリ設定を冪等に適用する(引数は scripts/init-repo-settings.sh 参照)
    cmds:
      - bash scripts/init-repo-settings.sh {{.CLI_ARGS}}
